<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibrant Lotto - 행운의 5게임 추첨</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <div class="confetti-bg"></div>
    
    <header class="main-header">
      <div class="logo">
        <span class="logo-icon">🎉</span>
        <h1 class="brand-name">Lucky 5 Lotto</h1>
      </div>
      <p class="tagline">한 번의 클릭으로 완성되는 행운의 5게임!</p>
    </header>

    <main class="main-content">
      <section class="drawing-section">
        <div id="games-container" class="games-container">
          <!-- 5 games will be generated here -->
          <div class="empty-state">
            <p>아래 버튼을 눌러 5게임을 한꺼번에 뽑아보세요!</p>
          </div>
        </div>

        <div class="controls">
          <button id="draw-btn" class="btn-primary">
            <span class="btn-text">5게임 추첨하기!</span>
            <span class="btn-glow"></span>
          </button>
          <button id="clear-btn" class="btn-secondary">모두 비우기</button>
        </div>
      </section>

      <section class="history-section">
        <div class="glass-card history-card">
          <div class="card-header">
            <h3>최근 추첨 내역</h3>
          </div>
          <div id="history-list" class="history-list">
            <p class="no-history">추첨을 시작해 보세요!</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="main-footer">
      <p>&copy; 2026 Vibrant Lotto. 신나는 행운이 가득하시길!</p>
    </footer>
  </div>

  <script defer type="module" src="main.js"></script>
</body>
</html>
