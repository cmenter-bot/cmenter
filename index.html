<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Lotto - 행운을 부르는 최고의 선택</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Pretendard:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <div class="texture-overlay"></div>
    
    <header class="main-header">
      <div class="logo">
        <span class="logo-icon">✨</span>
        <h1 class="brand-name">Premium Lotto</h1>
      </div>
      <p class="tagline">신뢰와 품격이 담긴 당신만의 행운 생성기</p>
    </header>

    <main class="main-content">
      <section class="drawing-section">
        <div class="glass-card main-card">
          <div class="card-header">
            <h2>금주의 추천 번호</h2>
            <span class="badge">LIVE</span>
          </div>
          
          <div id="lotto-display" class="lotto-display">
            <div class="empty-state">
              <p>버튼을 눌러 행운의 번호를 추첨하세요</p>
            </div>
          </div>

          <div class="controls">
            <button id="draw-btn" class="btn-primary">
              <span class="btn-text">번호 추첨하기</span>
              <span class="btn-glow"></span>
            </button>
            <button id="clear-btn" class="btn-secondary">초기화</button>
          </div>
        </div>
      </section>

      <section class="history-section">
        <div class="glass-card history-card">
          <div class="card-header">
            <h3>최근 추첨 내역</h3>
          </div>
          <div id="history-list" class="history-list">
            <p class="no-history">아직 추첨 내역이 없습니다.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="main-footer">
      <p>&copy; 2026 Premium Lotto. All Rights Reserved.</p>
      <div class="footer-links">
        <span>품격 있는 행운의 시작</span>
      </div>
    </footer>
  </div>

  <!-- Lotto Ball Template (Will be used by Custom Element) -->
  <template id="lotto-ball-template">
    <style>
      :host {
        display: inline-block;
        perspective: 1000px;
      }
      .ball {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Pretendard', sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        color: white;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        box-shadow: 
          inset -8px -8px 12px rgba(0,0,0,0.2),
          inset 4px 4px 10px rgba(255,255,255,0.4),
          0 10px 20px rgba(0,0,0,0.3);
        transform: rotateX(0deg);
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        opacity: 0;
        transform: scale(0.5) translateY(20px);
      }
      .ball.show {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
      /* Ball Colors by Range */
      :host([range="1-10"]) .ball { background: radial-gradient(circle at 30% 30%, #fde047, #ca8a04); color: #422006; }
      :host([range="11-20"]) .ball { background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8); }
      :host([range="21-30"]) .ball { background: radial-gradient(circle at 30% 30%, #f87171, #b91c1c); }
      :host([range="31-40"]) .ball { background: radial-gradient(circle at 30% 30%, #94a3b8, #334155); }
      :host([range="41-45"]) .ball { background: radial-gradient(circle at 30% 30%, #4ade80, #15803d); }
    </style>
    <div class="ball">
      <slot></slot>
    </div>
  </template>

  <script defer type="module" src="main.js"></script>
</body>
</html>
