<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Lotto Picker - 행운의 로또 번호 추천</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>🍀 Lucky Lotto Picker</h1>
      <p>당신의 행운을 믿어보세요! 클릭 한 번으로 오늘의 번호를 받아보세요.</p>
    </header>

    <main>
      <div id="ball-container" class="ball-container">
        <!-- Lotto balls will be generated here -->
        <div class="placeholder-text">행운의 버튼을 눌러주세요!</div>
      </div>

      <div class="controls">
        <button id="generate-btn" class="primary-btn">번호 생성하기</button>
        <button id="reset-btn" class="secondary-btn">초기화</button>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Lucky Lotto. 행운이 가득하시길 바랍니다!</p>
    </footer>
  </div>
  <script defer type="module" src="/main.js"></script>
</body>
</html>
